name: "rn-pr-labeler"
author: "@gmuloc"
description: "Parse a conventional commit compliant PR title and add it as a label to the PR with the prefix 'rn: '"
inputs:
  auto_create_label:
    description: "Boolean to indicate if the label should be auto created"
    required: false
    default: false
runs:
  using: "composite"
  steps:
    - name: Label PR for release notes
      env:
        AUTO_CREATE_LABEL: ${{ inputs.auto_create_label }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        set -euo pipefail

        old_label="$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name' | grep 'rn: ' || true)"
        if [[ -n "$old_label" ]]; then
          while IFS= read -r label; do
            [[ -n "$label" ]] || continue
            gh pr edit "$PR_NUMBER" --remove-label "$label"
          done <<< "$old_label"
        fi

        label="$(printf '%s' "$PR_TITLE" | cut -d ':' -f 1 | tr -d ' ')"
        rn_label="rn: $label"
        encoded_rn_label="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1], safe=""))' "$rn_label")"

        if [[ "$AUTO_CREATE_LABEL" == "true" ]]; then
          if ! gh api "repos/{owner}/{repo}/labels/$encoded_rn_label" --silent 2>/dev/null; then
            label_create_error="${RUNNER_TEMP:-.}/label_create_error"
            if ! gh label create "$rn_label" 2>"$label_create_error"; then
              if ! grep -Fq "already exists" "$label_create_error"; then
                cat "$label_create_error" >&2
                exit 1
              fi
            fi
          fi
        fi

        gh pr edit "$PR_NUMBER" --add-label "$rn_label"
      shell: bash
