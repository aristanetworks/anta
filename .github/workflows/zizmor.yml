---
name: zizmor

"on":
  pull_request:
    paths:
      - ".github/**"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - ".github/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install zizmor
        run: pip install --group zizmor

      - name: Run zizmor
        run: zizmor .github
